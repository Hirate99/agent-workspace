name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Node.js CLI
        run: npm run build
      - name: Verify compiled CLI is current
        run: git diff --exit-code -- .agents/skills/orchestrate-agent-workspaces/dist
      - name: Typecheck
        run: bun run typecheck
      - name: Test with coverage threshold
        run: bun run test:coverage
      - name: Test npm package installation
        run: bun run test:package
      - name: Publish package
        run: npm publish --access public