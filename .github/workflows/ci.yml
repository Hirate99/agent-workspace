name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Node.js CLI
        run: npm run build
      - name: Verify compiled CLI is current
        run: git diff --exit-code -- skills/orchestrate-agent-workspaces/scripts
      - name: Typecheck
        run: bun run typecheck
      - name: Test with coverage threshold
        run: bun run test:coverage
      - name: Test npm package installation
        run: bun run test:package
